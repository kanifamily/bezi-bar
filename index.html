<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEGE BAR</title>
  <style>
    /* ==============================
      VEGE BAR - Design Settings
    ============================== */
    :root {
      --bg: #1f1a17;
      --bg-soft: #2a241f;
      --card: rgba(255,255,255,0.065);
      --card-border: rgba(255,255,255,0.1);
      --text: #f3ede4;
      --text-soft: #d8c7ad;
      --text-muted: #9a8e7c;
      --accent: #7a8f63;
      --accent-soft: #a9bd86;
      --shadow: rgba(0,0,0,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      letter-spacing: 0.02em;
    }

    .hero {
      min-height: 62vh;
      background: linear-gradient(rgba(0,0,0,0.62), rgba(0,0,0,0.72)),
        url("https://images.unsplash.com/photo-1470337458703-46ad1756a187?q=80&w=1600&auto=format&fit=crop");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fffaf0;
      padding: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .hero h1 {
      font-size: clamp(2.8rem, 8vw, 5.4rem);
      letter-spacing: 0.14em;
      margin-bottom: 10px;
      font-weight: 500;
      text-shadow: 0 6px 24px rgba(0,0,0,0.55);
    }

    .hero p {
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: var(--text-soft);
      opacity: 0.95;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 64px 20px;
    }

    .lead {
      text-align: center;
      margin-bottom: 54px;
      font-size: 1.05rem;
      color: var(--text-soft);
    }

    .section-title {
      font-size: 1.75rem;
      margin: 48px 0 24px;
      border-left: 5px solid var(--accent);
      padding-left: 14px;
      color: #e8dcc8;
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 26px;
    }

   .menu-card {
  padding: 20px;
  border-radius: 16px;
  overflow: hidden;
  justify-content: space-between;

  display: flex;
  flex-direction: column;
  gap: 10px;   /* ←要素の間隔を自動で整える */

  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

    .menu-card:hover {
      transform: translateY(-3px);
      border-color: rgba(122,143,99,0.45);
      box-shadow: 0 16px 38px rgba(0,0,0,0.38);
    }

    .menu-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 8px;
}

    .menu-card h3 {
  font-size: 1.2rem;
  font-weight: 500;
  letter-spacing: 0.05em;
}

   .price {
  font-size: 0.95rem;
  color: #a9bd86;
  font-weight: bold;
}

   .menu-card p {
  font-size: 0.9rem;
  color: #d0c7b8;
  line-height: 1.6;
}

    .badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(216, 200, 176, 0.16);
      border: 1px solid rgba(216, 200, 176, 0.35);
      color: #d8c8b0;
      font-size: 0.85rem;
    }

    .concept {
      background: linear-gradient(135deg, rgba(122,143,99,0.14), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 42px 26px;
      text-align: center;
      margin-top: 64px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.26);
    }

    .concept h2 {
      color: #e8dcc8;
      margin-bottom: 16px;
      font-weight: 500;
      letter-spacing: 0.08em;
    }

    .concept p {
      color: var(--text-soft);
    }

    .notice {
      background: rgba(255,247,239,0.08);
      border: 1px solid rgba(217,191,165,0.35);
      padding: 18px;
      border-radius: 14px;
      color: #e6c7a8;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    @media (max-width: 768px) {
      .hero {
        min-height: 54vh;
      }

      .container {
        padding: 46px 16px;
      }

      .menu-grid {
        gap: 20px;
      }

      .menu-card {
        padding: 18px;
        overflow: hidden;
      }

     .menu-card img {
  width: 100%;
  height: 200px;      /* 高さ固定 */
  object-fit: cover;  /* トリミングして埋める */
  border-radius: 12px;
  filter: brightness(0.95) contrast(1.05);
}
    }
  </style>
</head>
<body>

  <section class="hero">
    <div>
      <h1>VEGE BAR</h1>
      <p>Herb & Mocktail / Kominka Home Bar</p>
    </div>
  </section>

  <main class="container">
    <p class="lead">
      古民家の静かな空間で、野菜とハーブを楽しむ小さなホームバー。
    </p>

    <div id="menuArea">
      <p class="notice">メニューを読み込み中...</p>
    </div>

    <section class="concept">
      <h2>Concept</h2>
      <p>
        自家栽培ハーブや季節の野菜を使った、やさしい一杯と小さなおつまみ。<br>
        季節によってメニューが少しずつ変わります。
      </p>
    </section>
  </main>

  <footer>© VEGE BAR</footer>

 <script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsGipFr-I8zMWImTHyEb2aUYPdxNB9ZcOEAuvn-Cfsabfzh57oYAGEXitjQW64QhgPIyYuH9ZwsGfu/pub?output=csv";

fetch(URL)
  .then(res => res.text())
  .then(text => {
    const rows = text.split("\n").map(r => r.split(","));
    const menuArea = document.getElementById("menuArea");

    let html = "";

    rows.slice(1).forEach(r => {
      if (!r[1]) return;

      html += `
        <div class="menu-card">
          ${r[4] ? `<img src="${r[4]}">` : ""}
          <h3>${r[1]}</h3>
          <div class="price">${r[2]}</div>
          <p>${r[3]}</p>
        </div>
      `;
    });

    menuArea.innerHTML = html;
  })
  .catch(err => {
    document.getElementById("menuArea").innerHTML = "読み込み失敗";
    console.error(err);
  });
</script>
</html>
