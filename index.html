<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEGE BAR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
      background: #1f1a17;
      color: #f3ede4;
      line-height: 1.8;
      letter-spacing: 0.02em;
    }

    .hero {
      min-height: 62vh;
      background: linear-gradient(rgba(0,0,0,0.62), rgba(0,0,0,0.72)),
        url("https://images.unsplash.com/photo-1470337458703-46ad1756a187?q=80&w=1600&auto=format&fit=crop");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fffaf0;
      padding: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .hero h1 {
      font-size: clamp(2.8rem, 8vw, 5.4rem);
      letter-spacing: 0.14em;
      margin-bottom: 10px;
      font-weight: 500;
      text-shadow: 0 6px 24px rgba(0,0,0,0.55);
    }

    .hero p {
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: #d8c7ad;
      opacity: 0.95;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 64px 20px;
    }

    .lead {
      text-align: center;
      margin-bottom: 54px;
      font-size: 1.05rem;
      color: #d8c7ad;
    }

    .section-title {
      font-size: 1.75rem;
      margin: 48px 0 24px;
      border-left: 5px solid #7a8f63;
      padding-left: 14px;
      color: #e8dcc8;
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 26px;
    }

    .menu-card {
      background: rgba(255,255,255,0.065);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.28);
      overflow: hidden;
      backdrop-filter: blur(6px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .menu-card:hover {
      transform: translateY(-3px);
      border-color: rgba(122,143,99,0.45);
      box-shadow: 0 16px 38px rgba(0,0,0,0.38);
    }

    .menu-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 15px;
      margin-bottom: 16px;
      background: #2a241f;
      filter: saturate(0.95) contrast(1.05);
    }

    .menu-card h3 {
      font-size: 1.28rem;
      color: #fff7e8;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .price {
      color: #a9bd86;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .menu-card p {
      color: #d8cfc0;
      font-size: 0.96rem;
    }

    .soldout {
      display: inline-block;
      margin-bottom: 10px;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(216, 200, 176, 0.16);
      border: 1px solid rgba(216, 200, 176, 0.35);
      color: #d8c8b0;
      font-size: 0.85rem;
    }

    .concept {
      background: linear-gradient(135deg, rgba(122,143,99,0.14), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 42px 26px;
      text-align: center;
      margin-top: 64px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.26);
    }

    .concept h2 {
      color: #e8dcc8;
      margin-bottom: 16px;
      font-weight: 500;
      letter-spacing: 0.08em;
    }

    .concept p {
      color: #d8c7ad;
    }

    .error {
      background: rgba(255,247,239,0.08);
      border: 1px solid rgba(217,191,165,0.35);
      padding: 18px;
      border-radius: 14px;
      color: #e6c7a8;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #9a8e7c;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    @media (max-width: 768px) {
      .hero {
        min-height: 54vh;
      }

      .container {
        padding: 46px 16px;
      }

      .menu-grid {
        gap: 20px;
      }

      .menu-card {
        padding: 18px;
      }

      .menu-card img {
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div>
      <h1>VEGE BAR</h1>
      <p>Herb & Mocktail / Kominka Home Bar</p>
    </div>
  </section>

  <main class="container">
    <p class="lead">
      古民家の静かな空間で、野菜とハーブを楽しむ小さなホームバー。
    </p>

    <div id="menuArea">
      <p>メニューを読み込み中...</p>
    </div>

    <section class="concept">
      <h2>Concept</h2>
      <p>
        自家栽培ハーブや季節の野菜を使った、やさしい一杯と小さなおつまみ。<br>
        季節によってメニューが少しずつ変わります。
      </p>
    </section>
  </main>

  <footer>© VEGE BAR</footer>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsGipFr-I8zMWImTHyEb2aUYPdxNB9ZcOEAuvn-Cfsabfzh57oYAGEXitjQW64QhgPIyYuH9ZwsGfu/pub?output=csv";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          row.push(cell.trim());
          cell = "";
        } else if ((char === "
" || char === "
") && !inQuotes) {
          if (cell || row.length) {
            row.push(cell.trim());
            rows.push(row);
            row = [];
            cell = "";
          }
          if (char === "
" && next === "
") i++;
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell.trim());
        rows.push(row);
      }

      return rows;
    }

    function renderMenu(items) {
      const menuArea = document.getElementById("menuArea");
      menuArea.innerHTML = "";

      if (!items.length) {
        menuArea.innerHTML = '<p class="error">メニューが登録されていません。</p>';
        return;
      }

      const categories = [...new Set(items.map(item => item.category || "Menu"))];

      categories.forEach(category => {
        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = category;
        menuArea.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "menu-grid";

        items
          .filter(item => (item.category || "Menu") === category)
          .forEach(item => {
            const card = document.createElement("article");
            card.className = "menu-card";

            card.innerHTML = `
              ${item.image ? `<img src="${item.image}" alt="${item.name}">` : ""}
              ${item.soldout && String(item.soldout).toUpperCase() === "TRUE" ? `<span class="soldout">Sold Out</span>` : ""}
              <h3>${item.name}</h3>
              <div class="price">${item.price}</div>
              <p>${item.description}</p>
            `;

            grid.appendChild(card);
          });

        menuArea.appendChild(grid);
      });
    }

    async function loadMenu() {
      const menuArea = document.getElementById("menuArea");

      try {
        const response = await fetch(SHEET_URL + "&cache=" + Date.now());
        if (!response.ok) {
          throw new Error("Google Sheets CSVを取得できませんでした");
        }

        const text = await response.text();
        const rows = parseCSV(text).filter(row => row.length > 1);

        const items = rows.slice(1).map(row => ({
          category: row[0] || "Menu",
          name: row[1] || "",
          price: row[2] || "",
          description: row[3] || "",
          image: row[4] || "",
          soldout: row[5] || ""
        })).filter(item => item.name);

        renderMenu(items);
      } catch (error) {
        menuArea.innerHTML = '<p class="error">Google Sheetsの読み込みに失敗しました。シートURLまたは公開設定を確認してください。</p>';
        console.error(error);
      }
    }

    loadMenu();
  </script>
</body>
</html>
