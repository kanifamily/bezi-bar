<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEGE BAR</title>
  <style>
    /* ==============================
      VEGE BAR - Design Settings
    ============================== */
    :root {
      --bg: #1f1a17;
      --bg-soft: #2a241f;
      --card: rgba(255,255,255,0.065);
      --card-border: rgba(255,255,255,0.1);
      --text: #f3ede4;
      --text-soft: #d8c7ad;
      --text-muted: #9a8e7c;
      --accent: #7a8f63;
      --accent-soft: #a9bd86;
      --shadow: rgba(0,0,0,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      letter-spacing: 0.02em;
    }

    .hero {
      min-height: 62vh;
      background: linear-gradient(rgba(0,0,0,0.62), rgba(0,0,0,0.72)),
        url("https://images.unsplash.com/photo-1470337458703-46ad1756a187?q=80&w=1600&auto=format&fit=crop");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fffaf0;
      padding: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .hero h1 {
      font-size: clamp(2.8rem, 8vw, 5.4rem);
      letter-spacing: 0.14em;
      margin-bottom: 10px;
      font-weight: 500;
      text-shadow: 0 6px 24px rgba(0,0,0,0.55);
    }

    .hero p {
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: var(--text-soft);
      opacity: 0.95;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 64px 20px;
    }

    .lead {
      text-align: center;
      margin-bottom: 54px;
      font-size: 1.05rem;
      color: var(--text-soft);
    }

    .section-title {
      font-size: 1.75rem;
      margin: 48px 0 24px;
      border-left: 5px solid var(--accent);
      padding-left: 14px;
      color: #e8dcc8;
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 26px;
    }

    .menu-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 12px 32px var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(6px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .menu-card:hover {
      transform: translateY(-3px);
      border-color: rgba(122,143,99,0.45);
      box-shadow: 0 16px 38px rgba(0,0,0,0.38);
    }

    .menu-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 15px;
      margin-bottom: 16px;
      background: var(--bg-soft);
      filter: saturate(0.95) contrast(1.05);
    }

    .menu-card h3 {
      font-size: 1.28rem;
      color: #fff7e8;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .price {
      color: var(--accent-soft);
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .menu-card p {
      color: #d8cfc0;
      font-size: 0.96rem;
    }

    .badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(216, 200, 176, 0.16);
      border: 1px solid rgba(216, 200, 176, 0.35);
      color: #d8c8b0;
      font-size: 0.85rem;
    }

    .concept {
      background: linear-gradient(135deg, rgba(122,143,99,0.14), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 42px 26px;
      text-align: center;
      margin-top: 64px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.26);
    }

    .concept h2 {
      color: #e8dcc8;
      margin-bottom: 16px;
      font-weight: 500;
      letter-spacing: 0.08em;
    }

    .concept p {
      color: var(--text-soft);
    }

    .notice {
      background: rgba(255,247,239,0.08);
      border: 1px solid rgba(217,191,165,0.35);
      padding: 18px;
      border-radius: 14px;
      color: #e6c7a8;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    @media (max-width: 768px) {
      .hero {
        min-height: 54vh;
      }

      .container {
        padding: 46px 16px;
      }

      .menu-grid {
        gap: 20px;
      }

      .menu-card {
        padding: 18px;
      }

      .menu-card img {
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div>
      <h1>VEGE BAR</h1>
      <p>Herb & Mocktail / Kominka Home Bar</p>
    </div>
  </section>

  <main class="container">
    <p class="lead">
      古民家の静かな空間で、野菜とハーブを楽しむ小さなホームバー。
    </p>

    <div id="menuArea">
      <p class="notice">メニューを読み込み中...</p>
    </div>

    <section class="concept">
      <h2>Concept</h2>
      <p>
        自家栽培ハーブや季節の野菜を使った、やさしい一杯と小さなおつまみ。<br>
        季節によってメニューが少しずつ変わります。
      </p>
    </section>
  </main>

  <footer>© VEGE BAR</footer>

  <script>
    /* ==============================
      VEGE BAR - App Settings
      今後変える場所は基本ここだけ
    ============================== */
    var APP = {
      sheetCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsGipFr-I8zMWImTHyEb2aUYPdxNB9ZcOEAuvn-Cfsabfzh57oYAGEXitjQW64QhgPIyYuH9ZwsGfu/pub?output=csv",
      // Google Sheetsの列順
      columns: ["category", "name", "price", "description", "image", "soldout"],
      // 表示したいカテゴリ順。シートに無いカテゴリは無視されます。
      categoryOrder: ["Mocktail", "Alcohol", "Food", "Coffee & Tea", "Seasonal", "Menu"],
      // シートが一時的に読めない時に出す仮メニュー
      fallbackMenu: [
        { category: "Mocktail", name: "Rosemary Tonic", price: "¥700", description: "ローズマリー香る爽やかなハーブトニック", image: "", soldout: "FALSE" },
        { category: "Mocktail", name: "Lavender Lemonade", price: "¥750", description: "ラベンダーがほんのり香るレモネード", image: "", soldout: "FALSE" },
        { category: "Mocktail", name: "Lemongrass Soda", price: "¥700", description: "レモングラスのすっきりソーダ", image: "", soldout: "FALSE" },
        { category: "Alcohol", name: "Gin & Tonic", price: "¥700", description: "すっきり香る定番の一杯", image: "", soldout: "FALSE" },
        { category: "Food", name: "Homemade Pickles", price: "¥500", description: "季節野菜の自家製ピクルス", image: "", soldout: "FALSE" }
      ]
    };

    /* ==============================
      Utility
    ============================== */
    function escapeHTML(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalize(value) {
      return String(value || "").trim();
    }

    function isSoldOut(value) {
      var text = normalize(value).toUpperCase();
      return text === "TRUE" || text === "YES" || text === "売り切れ" || text === "SOLD OUT";
    }

    /* ==============================
      CSV Parser
      カンマ・改行・説明文内のカンマにも対応
    ============================== */
    function parseCSV(text) {
      var rows = [];
      var row = [];
      var cell = "";
      var inQuotes = false;

      for (var i = 0; i < text.length; i++) {
        var char = text[i];
        var next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          row.push(cell.trim());
          cell = "";
        } else if ((char === "
" || char === "
") && !inQuotes) {
          if (cell || row.length) {
            row.push(cell.trim());
            rows.push(row);
            row = [];
            cell = "";
          }
          if (char === "
" && next === "
") i++;
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell.trim());
        rows.push(row);
      }

      return rows;
    }

    function rowsToItems(rows) {
      // 1行目は見出しとしてスキップ。A〜F列を固定で読む。
      return rows.slice(1).map(function(row) {
        return {
          category: normalize(row[0]) || "Menu",
          name: normalize(row[1]),
          price: normalize(row[2]),
          description: normalize(row[3]),
          image: normalize(row[4]),
          soldout: normalize(row[5])
        };
      }).filter(function(item) {
        return item.name;
      });
    }

    function sortCategories(categories) {
      return categories.sort(function(a, b) {
        var ai = APP.categoryOrder.indexOf(a);
        var bi = APP.categoryOrder.indexOf(b);
        if (ai === -1) ai = 999;
        if (bi === -1) bi = 999;
        return ai - bi;
      });
    }

    /* ==============================
      Render
    ============================== */
    function createMenuCard(item) {
      var card = document.createElement("article");
      card.className = "menu-card";

      var html = "";

      if (item.image) {
        html += '<img src="' + escapeHTML(item.image) + '" alt="' + escapeHTML(item.name) + '">';
      }

      if (isSoldOut(item.soldout)) {
        html += '<span class="badge">Sold Out</span>';
      }

      html += '<h3>' + escapeHTML(item.name) + '</h3>';

      if (item.price) {
        html += '<div class="price">' + escapeHTML(item.price) + '</div>';
      }

      if (item.description) {
        html += '<p>' + escapeHTML(item.description) + '</p>';
      }

      card.innerHTML = html;
      return card;
    }

    function renderMenu(items, message) {
      var menuArea = document.getElementById("menuArea");
      menuArea.innerHTML = "";

      if (message) {
        var notice = document.createElement("p");
        notice.className = "notice";
        notice.textContent = message;
        menuArea.appendChild(notice);
      }

      if (!items.length) {
        menuArea.innerHTML = '<p class="notice">メニューが登録されていません。</p>';
        return;
      }

      var categories = [];
      items.forEach(function(item) {
        var category = item.category || "Menu";
        if (categories.indexOf(category) === -1) categories.push(category);
      });

      categories = sortCategories(categories);

      categories.forEach(function(category) {
        var title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = category;
        menuArea.appendChild(title);

        var grid = document.createElement("div");
        grid.className = "menu-grid";

        items.filter(function(item) {
          return (item.category || "Menu") === category;
        }).forEach(function(item) {
          grid.appendChild(createMenuCard(item));
        });

        menuArea.appendChild(grid);
      });
    }

    /* ==============================
      Data Load
    ============================== */
    function loadMenu() {
      var menuArea = document.getElementById("menuArea");
      menuArea.innerHTML = '<p class="notice">メニューを読み込み中...</p>';

      fetch(APP.sheetCsvUrl + "&cache=" + new Date().getTime())
        .then(function(response) {
          if (!response.ok) throw new Error("CSV取得失敗");
          return response.text();
        })
        .then(function(text) {
          var rows = parseCSV(text).filter(function(row) {
            return row.some(function(cell) { return normalize(cell); });
          });

          var items = rowsToItems(rows);
          renderMenu(items);
        })
        .catch(function(error) {
          console.error(error);
          renderMenu(APP.fallbackMenu, "Google Sheetsを読み込めなかったため、仮メニューを表示しています。");
        });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", loadMenu);
    } else {
      loadMenu();
    }
  </script>
</body>
</html>
