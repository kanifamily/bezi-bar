<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEGE BAR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      background: #f4efe6;
      color: #2d2a26;
      line-height: 1.8;
    }

    .hero {
      height: 60vh;
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .hero-content h1 {
      font-size: 4rem;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .hero-content p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 60px 20px;
    }

    .section-title {
      font-size: 2rem;
      margin-bottom: 30px;
      border-left: 4px solid #556b4f;
      padding-left: 15px;
      color: #3e4d38;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 60px;
    }

    .menu-card {
      background: rgba(255,255,255,0.7);
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      backdrop-filter: blur(4px);
      transition: transform 0.2s ease;
    }

    .menu-card:hover {
      transform: translateY(-4px);
    }

    .menu-card h3 {
      font-size: 1.3rem;
      margin-bottom: 10px;
      color: #2f3b2a;
    }

    .price {
      color: #6f7f67;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .concept {
      background: #e8dfd0;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      margin-top: 30px;
    }

    .concept h2 {
      margin-bottom: 20px;
      color: #3e4d38;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #777;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .hero-content h1 {
        font-size: 2.5rem;
      }

      .hero {
        height: 50vh;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-content">
      <h1>VEGE BAR</h1>
      <p>Herb & Mocktail / Kominka Home Bar</p>
    </div>
  </section>

  <div class="container">

    <h2 class="section-title">Menu</h2>

    <div id="menuArea">
      <p>メニューを読み込み中...</p>
    </div>

    <div class="concept">
      <h2>Concept</h2>
      <p>
        古民家の静かな空間で、
        自家栽培ハーブを使った一杯を。
        <br><br>
        季節によってメニューが変わる、
        小さなホームバーです。
      </p>
    </div>

  </div>

  <footer>
    © VEGE BAR
  </footer>

  <script>
    // Google Sheets CSV URL
    // シートの列名は category, name, price, description, image, soldout にしてください
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsGipFr-I8zMWImTHyEb2aUYPdxNB9ZcOEAuvn-Cfsabfzh57oYAGEXitjQW64QhgPIyYuH9ZwsGfu/pub?output=csv";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && inQuotes && nextChar === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          row.push(cell.trim());
          cell = "";
        } else if ((char === '
' || char === '
') && !inQuotes) {
          if (cell || row.length) {
            row.push(cell.trim());
            rows.push(row);
            row = [];
            cell = "";
          }
          if (char === '
' && nextChar === '
') i++;
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell.trim());
        rows.push(row);
      }

      return rows;
    }

    function renderMenu(items) {
      const menuArea = document.getElementById("menuArea");
      menuArea.innerHTML = "";

      const categories = [...new Set(items.map(item => item.category || "Menu"))];

      categories.forEach(category => {
        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = category;
        menuArea.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "menu-grid";

        items
          .filter(item => (item.category || "Menu") === category)
          .forEach(item => {
            const card = document.createElement("div");
            card.className = "menu-card";

            const imageHtml = item.image
              ? `<img src="${item.image}" alt="${item.name}" style="width:100%; height:220px; object-fit:cover; border-radius:14px; margin-bottom:15px;">`
              : "";

            const soldoutHtml = item.soldout && item.soldout.toUpperCase() === "TRUE"
              ? `<div style="display:inline-block; margin-bottom:10px; padding:3px 10px; border-radius:999px; background:#d8c8b0; color:#5a4632; font-size:0.85rem;">Sold Out</div>`
              : "";

            card.innerHTML = `
              ${imageHtml}
              ${soldoutHtml}
              <h3>${item.name || ""}</h3>
              <div class="price">${item.price || ""}</div>
              <p>${item.description || ""}</p>
            `;

            grid.appendChild(card);
          });

        menuArea.appendChild(grid);
      });
    }

    async function loadMenu() {
      try {
        const response = await fetch(SHEET_CSV_URL);
        const text = await response.text();
        const rows = parseCSV(text);
        const headers = rows[0].map(header => header.trim().toLowerCase());

        const items = rows.slice(1)
          .filter(row => row.some(cell => cell))
          .map(row => {
            const item = {};
            headers.forEach((header, index) => {
              item[header] = row[index] || "";
            });
            return item;
          });

        renderMenu(items);
      } catch (error) {
        document.getElementById("menuArea").innerHTML = "<p>メニューを読み込めませんでした。Google Sheetsの公開設定を確認してください。</p>";
        console.error(error);
      }
    }

    loadMenu();
  </script>
</body>
</html>
