<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEGE BAR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
      background: #f4efe6;
      color: #2d2a26;
      line-height: 1.8;
    }

    .hero {
      min-height: 58vh;
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("https://images.unsplash.com/photo-1470337458703-46ad1756a187?q=80&w=1600&auto=format&fit=crop");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 24px;
    }

    .hero h1 {
      font-size: clamp(2.6rem, 8vw, 5rem);
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 1rem;
      letter-spacing: 0.08em;
      opacity: 0.92;
    }

    .container {
      max-width: 1050px;
      margin: 0 auto;
      padding: 56px 20px;
    }

    .lead {
      text-align: center;
      margin-bottom: 48px;
      font-size: 1.05rem;
      color: #4b453d;
    }

    .section-title {
      font-size: 1.8rem;
      margin: 44px 0 24px;
      border-left: 5px solid #556b4f;
      padding-left: 14px;
      color: #3e4d38;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .menu-card {
      background: rgba(255,255,255,0.75);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 5px 22px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .menu-card img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 15px;
      background: #e6dccd;
    }

    .menu-card h3 {
      font-size: 1.28rem;
      color: #2f3b2a;
      margin-bottom: 6px;
    }

    .price {
      color: #66745d;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .soldout {
      display: inline-block;
      margin-bottom: 10px;
      padding: 3px 10px;
      border-radius: 999px;
      background: #d8c8b0;
      color: #5a4632;
      font-size: 0.85rem;
    }

    .concept {
      background: #e8dfd0;
      border-radius: 22px;
      padding: 36px 24px;
      text-align: center;
      margin-top: 56px;
    }

    .concept h2 {
      color: #3e4d38;
      margin-bottom: 16px;
    }

    .error {
      background: #fff7ef;
      border: 1px solid #d9bfa5;
      padding: 18px;
      border-radius: 14px;
      color: #5d3b22;
    }

    footer {
      text-align: center;
      padding: 28px;
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <section class="hero">
    <div>
      <h1>VEGE BAR</h1>
      <p>Herb & Mocktail / Kominka Home Bar</p>
    </div>
  </section>

  <main class="container">
    <p class="lead">
      古民家の静かな空間で、野菜とハーブを楽しむ小さなホームバー。
    </p>

    <div id="menuArea">
      <p>メニューを読み込み中...</p>
    </div>

    <section class="concept">
      <h2>Concept</h2>
      <p>
        自家栽培ハーブや季節の野菜を使った、やさしい一杯と小さなおつまみ。<br>
        季節によってメニューが少しずつ変わります。
      </p>
    </section>
  </main>

  <footer>© VEGE BAR</footer>

  <script>
    // Google Sheets設定
    // 使うシートの1行目は category, name, price, description, image, soldout にしてください
    const SHEET_ID = "1M6rDqZ4kmtsIbvMia8M88Sq2yaSWaIlEdg1C6QVjrqU";
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsGipFr-I8zMWImTHyEb2aUYPdxNB9ZcOEAuvn-Cfsabfzh57oYAGEXitjQW64QhgPIyYuH9ZwsGfu/pub?output=csv";

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderMenu(items) {
      const menuArea = document.getElementById("menuArea");
      menuArea.innerHTML = "";

      if (!items.length) {
        menuArea.innerHTML = '<p class="error">メニューがまだ登録されていません。Google Sheetsの1行目と内容を確認してください。</p>';
        return;
      }

      const categories = [...new Set(items.map(item => item.category || "Menu"))];

      categories.forEach(category => {
        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = category;
        menuArea.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "menu-grid";

        items
          .filter(item => (item.category || "Menu") === category)
          .forEach(item => {
            const name = escapeHTML(item.name);
            const price = escapeHTML(item.price);
            const description = escapeHTML(item.description);
            const image = escapeHTML(item.image);
            const soldout = String(item.soldout || "").toUpperCase() === "TRUE";

            const card = document.createElement("article");
            card.className = "menu-card";
            card.innerHTML = `
              ${image ? `<img src="${image}" alt="${name}">` : ""}
              ${soldout ? `<span class="soldout">Sold Out</span>` : ""}
              <h3>${name}</h3>
              <div class="price">${price}</div>
              <p>${description}</p>
            `;
            grid.appendChild(card);
          });

        menuArea.appendChild(grid);
      });
    }

    // Google SheetsのJSONP読み込み後に呼ばれる関数
    window.googleSheetCallback = function(data) {
      try {
        const rows = data.table.rows || [];

        // Google Sheets側が1行目を「列名」として認識しない場合があるため、
        // まず固定の列順で読み込みます。
        // A: category / B: name / C: price / D: description / E: image / F: soldout
        const fixedHeaders = ["category", "name", "price", "description", "image", "soldout"];

        const items = rows.map(row => {
          const item = {};
          fixedHeaders.forEach((header, index) => {
            item[header] = row.c[index] && row.c[index].v != null ? row.c[index].v : "";
          });
          return item;
        })
        // 1行目が category,name,price... の見出しなら除外
        .filter(item => String(item.name).toLowerCase() !== "name")
        // 商品名がある行だけ表示
        .filter(item => item.name);

        renderMenu(items);
      } catch (error) {
        document.getElementById("menuArea").innerHTML = '<p class="error">メニューの読み込みに失敗しました。Google SheetsのA列〜F列に category, name, price, description, image, soldout の順で入力してください。</p>';
        console.error(error);
      }
    };

    function loadMenuFromGoogleSheets() {
      const script = document.createElement("script");
      script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:googleSheetCallback&gid=${SHEET_GID}&cache=${Date.now()}`;
      script.onerror = function() {
        document.getElementById("menuArea").innerHTML = '<p class="error">Google Sheetsを読み込めませんでした。シートの共有設定を「リンクを知っている全員が閲覧可」にしてください。</p>';
      };
      document.body.appendChild(script);
    }

    loadMenuFromGoogleSheets();
  </script>
</body>
</html>
